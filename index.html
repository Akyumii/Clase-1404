<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Mis Electivos</title>
        <style>
            body {
                font-family: Helvetica, Arial, sans-serif;
				color: pink;
            }
			table {
				border-collapse: collapse;
			}
			td, th{
				border: 1px solid pink;
				padding:1rem;
			}
        </style>
    </head>
    <body>
        <h1>ദ്ദി◝ ⩊ ◜.ᐟ</h1>
		<table>
			<thead>
				<tr>
					<th>Asignatura</th>
					<th>Grupo</th>
					<th>Enfoque</th>
				</tr>
			</thead>
			<tbody></tbody>
		</table>
		
        <ol id="estudiantes"></ol>

        <script>
			const t = document.querySelector("table");
			
            const URL = "https://api.myjson.online/v1/records/c87ce286-2a29-4852-b4d7-5d75ff17362c";
            fetch(URL)
				.then((respuesta) => {
					if (!respuesta.ok) {
						throw new Error("Error HTTP: " + respuesta.status);
					}
					return respuesta.json();
				})
				.then((datos) => {
					var trabajo = datos.data;
					console.log("Datos recibidos:", trabajo);
					trabajo.forEach((x) => {
						if (x.ok == 1) {
							t.innerHTML += `<tr><td>${x.name}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
						}
					});
				})
				.catch((error) => {
					console.error("Algo salió mal:", error);
				});
        </script>
    </body>
</html>
